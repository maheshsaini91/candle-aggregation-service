spring.application.name=aggregationservice
server.servlet.context-path=/aggregationservice/api

# Server
server.port=8080

# Actuator - expose health + prometheus metrics
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Candle Aggregation Config
candle.generator.enabled=true
candle.generator.rate-ms=200
candle.symbols=BTC-USD,ETH-USD,SOL-USD

# Late event grace period in seconds
# Events older than this threshold are dropped with a warning
candle.aggregation.grace-period-sec=5

# Backpressure queue capacity per symbol
# If queue fills up, new events are dropped to protect the aggregation thread
candle.aggregation.queue-capacity=10000

# Logging
logging.level.com.candle=DEBUG